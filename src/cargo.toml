[package]
name = "neoh"
version = "0.1.0"
authors = ["stefand-0"]
edition = "2026"
description = "A declarative HDL transpiler for rapid testbench development."
license = "Apache-2.0"
readme = "README.md"
repository = "https://github.com/stefand-0/neoh"

[[bin]]
name = "neo_compiler"
path = "src/main.rs"

[dependencies]
# Pest and owo
pest = "2.7"
pest_derive = "2.7"
owo-colors = "4.0" 
